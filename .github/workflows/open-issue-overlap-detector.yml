name: Open-Issue Overlap Detector

on:
  schedule:
    - cron: "30 6 * * 1" # Every Monday at 06:30 UTC
  workflow_dispatch:
    inputs:
      similarity_threshold:
        description: "Minimum similarity score (0-1) to flag overlap"
        required: false
        default: "0.4"
      output_json:
        description: "Emit JSON output (true/false)"
        required: false
        default: "false"
      dry_run:
        description: "Print report without non-zero exit (true/false)"
        required: false
        default: "true"

permissions:
  issues: read
  contents: read

jobs:
  detect-overlaps:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: node --test scripts/open-issue-overlap-detector.test.js

      - name: Run overlap detection
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          SIMILARITY_THRESHOLD: ${{ github.event.inputs.similarity_threshold || '0.4' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          OUTPUT_JSON: ${{ github.event.inputs.output_json || 'false' }}
        run: |
          echo '[]' | node scripts/open-issue-overlap-detector.js
