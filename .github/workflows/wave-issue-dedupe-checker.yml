name: Wave Issue Dedupe Checker

on:
  schedule:
    - cron: "0 7 * * 3" # Every Wednesday at 07:00 UTC
  workflow_dispatch:
    inputs:
      closed_window_days:
        description: "Days back to scan closed issues"
        required: false
        default: "90"
      high_confidence:
        description: "Score threshold for high-confidence duplicate (0-1)"
        required: false
        default: "0.7"
      low_confidence:
        description: "Score threshold for low-confidence similarity (0-1)"
        required: false
        default: "0.35"
      output_json:
        description: "Emit JSON output (true/false)"
        required: false
        default: "false"
      dry_run:
        description: "Print report without non-zero exit (true/false)"
        required: false
        default: "true"

permissions:
  issues: read
  contents: read

jobs:
  dedupe-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: node --test scripts/wave-issue-dedupe-checker.test.js

      - name: Run dedupe check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          CLOSED_WINDOW_DAYS: ${{ github.event.inputs.closed_window_days || '90' }}
          HIGH_CONFIDENCE: ${{ github.event.inputs.high_confidence || '0.7' }}
          LOW_CONFIDENCE: ${{ github.event.inputs.low_confidence || '0.35' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          OUTPUT_JSON: ${{ github.event.inputs.output_json || 'false' }}
        run: |
          echo '[]' | node scripts/wave-issue-dedupe-checker.js
