name: CI Evidence Summarizer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to summarise"
        required: true
      output_json:
        description: "Emit JSON output (true/false)"
        required: false
        default: "false"

permissions:
  pull-requests: write
  checks: read
  actions: read
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: node --test scripts/ci-evidence-summarizer.test.js

      - name: Post CI evidence summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT_JSON: ${{ github.event.inputs.output_json || 'false' }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          node scripts/ci-evidence-summarizer.js "$PR_NUMBER" > /tmp/ci-summary.md
          cat /tmp/ci-summary.md

      - name: Find and update or create summary comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          SUMMARY=$(cat /tmp/ci-summary.md)

          # Check for existing summary comment
          EXISTING=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPO/issues/$PR_NUMBER/comments" | \
            jq '.[] | select(.body | startswith("## CI Evidence Summary")) | .id' | head -1)

          if [ -n "$EXISTING" ]; then
            # Update existing comment
            jq -n --arg body "$SUMMARY" '{body: $body}' > /tmp/comment.json
            curl -s -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GITHUB_REPO/issues/comments/$EXISTING" \
              -d @/tmp/comment.json
          else
            # Create new comment
            jq -n --arg body "$SUMMARY" '{body: $body}' > /tmp/comment.json
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GITHUB_REPO/issues/$PR_NUMBER/comments" \
              -d @/tmp/comment.json
          fi
