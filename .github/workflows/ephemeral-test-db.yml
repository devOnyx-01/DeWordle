name: Ephemeral Test Database

on:
  pull_request:
    paths:
      - "scripts/provision-ephemeral-db.js"
      - "scripts/provision-ephemeral-db.test.js"
      - ".github/workflows/ephemeral-test-db.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform (provision, teardown, auto)"
        required: false
        default: "auto"
      db_name:
        description: "Ephemeral database name (auto-generated if empty)"
        required: false

concurrency:
  group: ephemeral-test-db-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dewordledb
          POSTGRES_USER: dewordledb_owner
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U dewordledb_owner
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: node --test scripts/provision-ephemeral-db.test.js

      - name: Provision ephemeral database
        id: provision
        run: |
          EPHEMERAL_DB_NAME=$(node scripts/provision-ephemeral-db.js provision | grep '^EPHEMERAL_DB_NAME=' | cut -d= -f2)
          echo "ephemeral_db_name=$EPHEMERAL_DB_NAME" >> $GITHUB_OUTPUT
          echo "Provisioned: $EPHEMERAL_DB_NAME"

      - name: Verify database exists
        env:
          PGPASSWORD: password
        run: |
          psql -h localhost -U dewordledb_owner -d ${{ steps.provision.outputs.ephemeral_db_name }} -c "SELECT 1 AS alive"

      - name: Teardown ephemeral database
        if: always()
        env:
          EPHEMERAL_DB_NAME: ${{ steps.provision.outputs.ephemeral_db_name }}
        run: node scripts/provision-ephemeral-db.js teardown "$EPHEMERAL_DB_NAME"
