name: Stale PR Behind-Main Notifier

on:
  schedule:
    - cron: "0 10 * * 1-5" # Weekdays at 10:00 UTC
  workflow_dispatch:
    inputs:
      stale_days:
        description: "Inactivity threshold in days before flagging"
        required: false
        default: "14"
      behind_threshold:
        description: "Commits behind main to flag"
        required: false
        default: "5"
      label_to_skip:
        description: "Label that exempts PR from staleness checks"
        required: false
        default: "wip"
      dry_run:
        description: "Log without posting comments"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: stale-pr-behind-main-notifier
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: node --test scripts/stale-pr-behind-main-notifier.test.js

      - name: Run stale PR notifier
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          STALE_DAYS: ${{ github.event.inputs.stale_days || '14' }}
          BEHIND_THRESHOLD: ${{ github.event.inputs.behind_threshold || '5' }}
          LABEL_TO_SKIP: ${{ github.event.inputs.label_to_skip || 'wip' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/stale-pr-behind-main-notifier.js
