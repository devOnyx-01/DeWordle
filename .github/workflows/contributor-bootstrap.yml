name: Contributor Bootstrap

on:
  pull_request:
    paths:
      - "scripts/contributor-bootstrap.js"
      - "scripts/fixture-sandbox.js"
      - "scripts/pr-checklist-commenter.js"
      - ".github/workflows/contributor-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run bootstrap diagnostics
        run: node scripts/contributor-bootstrap.js all --json
      - name: Validate PR checklist helper
        run: node scripts/pr-checklist-commenter.js "Closes #627" "Validation: node scripts/contributor-bootstrap.js --json"
